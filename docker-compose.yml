version: '3.5'

services:
  db:
    image: "postgres:alpine"
    environment:
      - POSTGRES_USER=devweek
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=devweek
    ports:
      - "5432"
    volumes:
      - dbdata:/var/lib/postgresql/data:delegated

  broker:
    image: "rabbitmq:alpine"

  result:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  frontend:
    build:
      dockerfile: frontend/Dockerfile
      context: .
    volumes:
      - .:/app/
      - /app/node_modules
    ports:
      - "3000:3000"

  backend:
    build:
      dockerfile: backend/Dockerfile
      context: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/home/user/app/
    env_file: backend/.env  # ✅ Ensure .env file is being loaded
    environment:  # ✅ Explicitly define the necessary environment variables
      - DJANGO_SETTINGS_MODULE=devweek.settings.local
      - DATABASE_URL=postgres://devweek:password@db:5432/devweek
    depends_on:
      - db
      - broker
      - result
      - frontend

  celery:
    build:
      dockerfile: backend/Dockerfile
      context: .
    command: celery --app=devweek worker --loglevel=info
    volumes:
      - ./:/home/user/app/
    env_file: backend/.env
    environment:  # ✅ Ensure Celery also uses the correct settings
      - DJANGO_SETTINGS_MODULE=devweek.settings.local
      - DATABASE_URL=postgres://devweek:password@db:5432/devweek
    depends_on:
      - db
      - broker
      - result

  mailhog: # service for faking a SMTP server
    image: mailhog/mailhog
    ports:
      - '1025:1025' # SMTP server
      - '8025:8025' # Web UI

volumes:
  dbdata:
    name: devweek_dbdata
    external: true
